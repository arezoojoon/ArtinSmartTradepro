services:
  nginx:
    image: nginx:1.27-alpine
    container_name: artin_nginx
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - artin_net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: artin_api
    env_file:
      - ./.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # command: [ "/bin/sh", "-c", "/app/entrypoint.sh" ]
    volumes:
      - app_data:/app_data
    restart: unless-stopped
    networks:
      - artin_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: artin_frontend
    env_file:
      - ./.env.prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - artin_net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 30s
      timeout: 5s
      retries: 5

  # worker service disabled — app/workers/ module does not exist yet
  # worker:
  #   build:
  #     context: ../backend
  #     dockerfile: Dockerfile
  #   container_name: artin_worker
  #   env_file:
  #     - ./.env.prod
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_started
  #   command: [ "python", "-m", "app.workers.main" ]
  #   volumes:
  #     - app_data:/app_data
  #   restart: unless-stopped
  #   networks:
  #     - artin_net

  db:
    image: postgres:16-alpine
    container_name: artin_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - artin_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: artin_redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - artin_net

  minio:
    image: minio/minio:latest
    container_name: artin_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - artin_net

networks:
  artin_net:


volumes:
  pg_data:
  redis_data:
  minio_data:
  app_data:
