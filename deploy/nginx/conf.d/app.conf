upstream api_upstream {
    server artin_api:8000;
}

upstream frontend_upstream {
    server artin_frontend:3000;
}

map $http_cf_visitor $cf_scheme {
    default "";
    '~"scheme":"https"' https;
}

map $http_x_forwarded_proto $xff_scheme {
    default "";
    https https;
}

map $http_upgrade $connection_upgrade {
    default close;
    "upgrade" upgrade;
}

server {
    listen 80;
    # listen 443 ssl http2;
    server_name trade.artinsmartagent.com localhost;

    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ensure HTTPS once request actually originated as HTTP
    # set $real_scheme $scheme;
    # if ($cf_scheme = https) {
    #     set $real_scheme https;
    # }
    # if ($xff_scheme = https) {
    #     set $real_scheme https;
    # }
    # if ($real_scheme = http) {
    #     return 301 https://$host$request_uri;
    # }
    set $real_scheme http;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
    }

    location /health {
        proxy_pass http://api_upstream/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
    }
}

server {
    listen 80 default_server;
    server_name _;
    # Handle localhost requests directly
    location / {
        if ($host = "localhost") {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            return 200;
        }
        # Forward all unmatched requests to main server
        return 301 http://trade.artinsmartagent.com$request_uri;
    }
}
